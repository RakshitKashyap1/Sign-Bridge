name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: ${{ secrets.DOCKER_USERNAME }}/signbridge-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/signbridge-frontend

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint Python (backend)
        run: |
          cd backend
          ruff check app/ --exit-zero

      - name: Lint lockfile
        run: |
          curl -sSf https://raw.githubusercontent.com/astral-sh/uv-lock/main/uv-lock > /tmp/uv-lock 2>/dev/null \
            || echo "uv-lock not available — skipping"

      - name: Install Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint frontend
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run typecheck || true

      - name: Build Docker images
        run: |
          docker build -t signbridge-backend:test -f backend/Dockerfile .
          docker build -t signbridge-frontend:test -f frontend/Dockerfile .

      - name: Docker Compose lint
        run: |
          docker compose -f docker-compose.yml config > /dev/null 2>&1 && echo "docker-compose.yml is valid" || echo "WARNING: docker-compose config failed"

  docker-build-and-push:
    name: Build & Push Docker Images
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            cd /opt/signbridge-staging
            export IMAGE_BACKEND="${{ env.IMAGE_BACKEND }}:${{ github.sha }}"
            export IMAGE_FRONTEND="${{ env.IMAGE_FRONTEND }}:${{ github.sha }}"
            docker compose -f docker-compose.yml --env-file .env pull
            docker compose -f docker-compose.yml --env-file .env up -d --force-recreate
            docker system prune -f

  deploy-production:
    name: Deploy to Production
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          script: |
            cd /opt/signbridge
            export IMAGE_BACKEND="${{ env.IMAGE_BACKEND }}:${{ github.sha }}"
            export IMAGE_FRONTEND="${{ env.IMAGE_FRONTEND }}:${{ github.sha }}"
            docker compose -f docker-compose.yml --env-file .env pull
            docker compose -f docker-compose.yml --env-file .env up -d --force-recreate
            docker system prune -f
        env:
          IMAGE_BACKEND: ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          IMAGE_FRONTEND: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
