version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signbridge-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/ml/models
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ./ml/models:/app/ml/models
    restart: unless-stopped
    networks:
      - signbridge-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: signbridge-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - signbridge-network

  nginx:
    image: nginx:alpine
    container_name: signbridge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - signbridge-network

networks:
  signbridge-network:
    driver: bridge